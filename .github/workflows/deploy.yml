# 自动部署到 GitHub Pages
# 每次 push 到 main 自动构建并发布,公网访问 https://zsrmoyanzsr.github.io/wasteland-shelter/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署,避免冲突
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # 用 GH_PAGES=1 让 vite.config.js 的 base 设为 /wasteland-shelter/
      - run: npm run build
        env:
          GH_PAGES: "1"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
